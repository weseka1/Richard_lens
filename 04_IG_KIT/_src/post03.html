<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&f[]=general-sans@500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;background:#0E0D0B;color:#F2EDE3;font-family:'General Sans',sans-serif;overflow:hidden;position:relative;display:flex;align-items:center}
.grain{position:absolute;inset:0;opacity:.06;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.top{position:absolute;top:70px;left:80px;right:80px;display:flex;justify-content:space-between;font-size:26px;letter-spacing:.35em;text-transform:uppercase;color:#D4AF37}
.h1{padding:0 80px;font-family:'Clash Display',sans-serif;font-weight:700;text-transform:uppercase;font-size:118px;line-height:1.02;letter-spacing:-.02em}
.h1 .gold{color:#D4AF37}
.tag{position:absolute;left:80px;bottom:200px;font-family:'Permanent Marker',cursive;font-size:54px;color:#F0D060;transform:rotate(-5deg)}
.hash{position:absolute;bottom:80px;right:80px;font-size:28px;letter-spacing:.2em;text-transform:uppercase;color:#CFC8B8}
.hash b{color:#D4AF37;font-weight:500}
</style></head><body>
<div class="grain"></div>
<div class="top"><span>Richard Lens</span><span>Manifiesto</span></div>
<div class="h1">Acá no<br>se ven<br>los ojos.<br><span class="gold">Se ven<br>los lentes.</span></div>
<div class="tag">bienvenido a la banda</div>
<div class="hash"><b>#</b>SeTeNotaLoRich</div>
</body></html>
