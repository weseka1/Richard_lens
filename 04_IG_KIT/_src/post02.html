<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&f[]=general-sans@500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;background:#0E0D0B;color:#F2EDE3;font-family:'General Sans',sans-serif;overflow:hidden;position:relative}
.grain{position:absolute;inset:0;opacity:.06;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.top{position:absolute;top:70px;left:80px;right:80px;display:flex;justify-content:space-between;font-size:26px;letter-spacing:.35em;text-transform:uppercase;color:#D4AF37}
.print{position:absolute;top:170px;left:50%;transform:translateX(-50%) rotate(-2.5deg);background:#F5F1E8;padding:20px;width:680px;box-shadow:0 40px 90px rgba(0,0,0,.6)}
.print img{width:100%;display:block}
.tape{position:absolute;top:-20px;left:50%;transform:translateX(-50%) rotate(-3deg);width:200px;height:52px;background:rgba(212,175,55,.8);box-shadow:0 3px 8px rgba(0,0,0,.35)}
.h2{position:absolute;left:80px;bottom:200px;font-family:'Clash Display',sans-serif;font-weight:700;text-transform:uppercase;font-size:96px;line-height:.95;letter-spacing:-.02em;text-shadow:0 6px 30px rgba(14,13,11,.7)}
.h2 .gold{color:#D4AF37}
.tag{position:absolute;right:70px;bottom:430px;font-family:'Permanent Marker',cursive;font-size:46px;color:#F0D060;transform:rotate(-6deg)}
.bar{position:absolute;bottom:70px;left:80px;right:80px;border-top:1px solid rgba(212,175,55,.35);padding-top:26px;display:flex;justify-content:space-between;font-size:23px;letter-spacing:.12em;text-transform:uppercase;color:#CFC8B8;white-space:nowrap}
.bar b{color:#D4AF37;font-weight:500}
</style></head><body>
<div class="grain"></div>
<div class="top"><span>Richard Lens</span><span>Drop semanal</span></div>
<figure class="print"><span class="tape"></span><img src="../../02_DEMO_WEB/assets/wayfarer-par.jpg" alt=""></figure>
<div class="tag">ese. exacto ese.</div>
<div class="h2">Wayfarer<br><span class="gold">negro mate</span></div>
<div class="bar"><span><b>3 cuotas</b> sin interés</span><span>Foto real antes de pagar</span><span>WhatsApp</span></div>
</body></html>
