<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&f[]=general-sans@500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;background:#0E0D0B;color:#F2EDE3;font-family:'General Sans',sans-serif;overflow:hidden;position:relative}
.frame{position:absolute;inset:40px;border:1px solid rgba(212,175,55,.45);pointer-events:none}
.top{position:absolute;top:66px;left:80px;right:80px;display:flex;justify-content:space-between;align-items:center;font-size:23px;letter-spacing:.32em;text-transform:uppercase;color:#D4AF37}
.dollar{position:absolute;right:-30px;top:120px;font-family:'Clash Display',sans-serif;font-weight:700;font-size:520px;line-height:1;color:rgba(46,125,82,.07)}
.h1{position:absolute;left:84px;top:250px;font-family:'Clash Display',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:-.03em;line-height:.95}
.h1 .l1{display:block;font-size:150px;color:#D4AF37}
.h1 .l2{display:block;font-size:120px}
.h1 .l3{display:block;font-size:96px}
.list{position:absolute;left:84px;top:800px;right:84px}
.list .row{display:flex;justify-content:space-between;align-items:baseline;padding:26px 0;border-top:1px solid rgba(212,175,55,.3);font-size:42px;color:#F2EDE3}
.list .row:last-child{border-bottom:1px solid rgba(212,175,55,.3)}
.list .k{color:#D4AF37;font-size:24px;letter-spacing:.18em;text-transform:uppercase}
.arrow{position:absolute;right:86px;bottom:74px;font-size:46px;color:#D4AF37}
.grain{position:absolute;inset:0;opacity:.05;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
</style></head><body>
<div class="frame"></div>
<div class="dollar">$</div>
<div class="top"><span>Drop 001</span><span>#003/005</span></div>
<div class="h1"><span class="l1">Cuotas</span><span class="l2">+ env&iacute;o a</span><span class="l3">todo el pa&iacute;s.</span></div>
<div class="list">
<div class="row"><span>Asegurado</span><span class="k">Siempre</span></div>
<div class="row"><span>Con seguimiento</span><span class="k">Tracking</span></div>
<div class="row"><span>Despachado</span><span class="k">24&ndash;48 h</span></div>
</div>
<div class="arrow">&rarr;</div>
<div class="grain"></div>
</body></html>
