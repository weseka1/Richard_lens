<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&f[]=general-sans@500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;background:#0E0D0B;color:#F2EDE3;font-family:'General Sans',sans-serif;overflow:hidden;position:relative}
.frame{position:absolute;inset:40px;border:1px solid rgba(212,175,55,.45);pointer-events:none}
.top{position:absolute;top:66px;left:80px;right:80px;display:flex;justify-content:space-between;align-items:center;font-size:23px;letter-spacing:.32em;text-transform:uppercase;color:#D4AF37}
.h1{position:absolute;left:84px;top:230px;font-family:'Clash Display',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:-.03em;line-height:.94}
.h1 .big{display:block;font-size:210px;color:#D4AF37}
.h1 .sub{display:block;font-size:106px}
.card{position:absolute;right:88px;top:560px;width:330px;padding:26px 28px 22px;border:1px solid rgba(212,175,55,.75);background:#14120D;transform:rotate(3deg);box-shadow:0 30px 70px rgba(0,0,0,.55);text-align:center}
.card .row{display:flex;justify-content:space-between;font-size:18px;letter-spacing:.2em;text-transform:uppercase;color:#CFC8B8}
.card .crown{font-size:88px;color:#D4AF37;margin:18px 0 6px}
.card .name{font-family:'Clash Display',sans-serif;font-weight:700;font-size:42px;letter-spacing:-.02em;color:#F2EDE3}
.card .small{margin-top:10px;font-size:19px;line-height:1.4;color:#CFC8B8}
.card .foot{margin-top:18px;border-top:1px solid rgba(212,175,55,.35);padding-top:12px;font-size:17px;letter-spacing:.18em;text-transform:uppercase;color:#D4AF37}
.body{position:absolute;left:84px;top:870px;max-width:560px;font-size:42px;line-height:1.5;color:#CFC8B8}
.body b{color:#F2EDE3;font-weight:500}
.body .gold{color:#D4AF37}
.arrow{position:absolute;right:86px;bottom:74px;font-size:46px;color:#D4AF37}
.grain{position:absolute;inset:0;opacity:.05;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
</style></head><body>
<div class="frame"></div>
<div class="top"><span>La caja fuerte</span><span>#004/005</span></div>
<div class="h1"><span class="big">100%</span><span class="sub">Originales.</span></div>
<div class="card">
<div class="row"><span>RL</span><span>#Garant&iacute;a</span></div>
<div class="crown">&#9819;</div>
<div class="name">#GARANT&Iacute;A</div>
<div class="small">Si no es original,<br>devolvemos el doble.</div>
<div class="foot">Richard Lens &middot; 001/&infin;</div>
</div>
<div class="body"><b>Grabados, estuche y factura</b> a la vista antes de pagar.<br>Si no es original, <span class="gold">devolvemos el doble.</span></div>
<div class="arrow">&rarr;</div>
<div class="grain"></div>
</body></html>
