<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&f[]=general-sans@500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;background:#0E0D0B;color:#F2EDE3;font-family:'General Sans',sans-serif;overflow:hidden;position:relative}
.frame{position:absolute;inset:40px;border:1px solid rgba(212,175,55,.45);pointer-events:none}
.top{position:absolute;top:66px;left:80px;right:80px;display:flex;justify-content:space-between;align-items:center;font-size:23px;letter-spacing:.32em;text-transform:uppercase;color:#D4AF37}
.label{position:absolute;top:150px;left:84px;font-size:24px;letter-spacing:.3em;text-transform:uppercase;color:#CFC8B8}
.list{position:absolute;left:84px;top:225px;font-family:'Clash Display',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:-.03em;line-height:.98}
.list div{display:flex;align-items:baseline;gap:22px}
.ix{font-family:'General Sans',sans-serif;font-weight:500;font-size:22px;letter-spacing:.1em;color:#2E7D52;min-width:44px}
.gold{color:#D4AF37}
.foot{position:absolute;left:84px;bottom:88px;font-size:23px;letter-spacing:.18em;text-transform:uppercase;color:#CFC8B8}
.foot b{color:#D4AF37;font-weight:500}
.arrow{position:absolute;right:86px;bottom:74px;font-size:46px;color:#D4AF37}
.grain{position:absolute;inset:0;opacity:.05;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
</style></head><body>
<div class="frame"></div>
<div class="top"><span>La caja fuerte</span><span>#002/005</span></div>
<div class="label">Colección — por encargo</div>
<div class="list">
<div><span class="ix">01</span><span style="font-size:148px">Prada</span></div>
<div><span class="ix">02</span><span class="gold" style="font-size:148px">Gucci</span></div>
<div><span class="ix">03</span><span style="font-size:94px">Louis Vuitton</span></div>
<div><span class="ix">04</span><span class="gold" style="font-size:116px">Balenciaga</span></div>
<div><span class="ix">05</span><span style="font-size:148px">Fendi</span></div>
<div><span class="ix">06</span><span class="gold" style="font-size:132px">Versace</span></div>
<div><span class="ix">07</span><span style="font-size:78px">Dolce &amp; Gabbana</span></div>
</div>
<div class="foot"><b>Originales</b> · Consultá la que buscás</div>
<div class="arrow">&rarr;</div>
<div class="grain"></div>
</body></html>
