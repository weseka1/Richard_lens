<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&f[]=general-sans@500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;background:#0E0D0B;color:#F2EDE3;font-family:'General Sans',sans-serif;overflow:hidden;position:relative}
.frame{position:absolute;inset:40px;border:1px solid rgba(212,175,55,.45);pointer-events:none}
.top{position:absolute;top:66px;left:80px;right:80px;display:flex;justify-content:space-between;align-items:center;font-size:23px;letter-spacing:.32em;text-transform:uppercase;color:#D4AF37}
.dollar{position:absolute;left:-60px;bottom:-30px;font-family:'Clash Display',sans-serif;font-weight:700;font-size:560px;line-height:1;color:rgba(212,175,55,.05)}
.card{position:absolute;left:50%;top:150px;transform:translateX(-50%) rotate(-2deg);width:740px;border:1px solid rgba(212,175,55,.8);background:#141209;padding:16px;box-shadow:0 40px 90px rgba(0,0,0,.6)}
.card img{width:100%;height:520px;object-fit:cover;display:block;filter:grayscale(.82) contrast(1.06)}
.card .cap{display:flex;justify-content:space-between;padding:16px 6px 4px;font-size:20px;letter-spacing:.22em;text-transform:uppercase;color:#CFC8B8}
.card .cap b{color:#D4AF37;font-weight:500}
.h1{position:absolute;left:82px;bottom:190px;font-family:'Clash Display',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:-.03em;font-size:110px;line-height:.96}
.h1 .gold{color:#D4AF37}
.foot{position:absolute;left:84px;bottom:88px;font-size:23px;letter-spacing:.2em;text-transform:uppercase;color:#CFC8B8}
.arrow{position:absolute;right:86px;bottom:74px;font-size:46px;color:#D4AF37}
.grain{position:absolute;inset:0;opacity:.05;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
</style></head><body>
<div class="frame"></div>
<div class="dollar">$</div>
<div class="top"><span>Richard Lens</span><span>Drop 001</span></div>
<div class="card">
<img src="../../02_DEMO_WEB/assets/wayfarer-34.jpg" alt="">
<div class="cap"><span>Ray-Ban Wayfarer</span><b>#001/100</b></div>
</div>
<div class="h1">El Wayfarer<br>que te<br>imagin&aacute;s. <span class="gold">Ese.</span></div>
<div class="foot">Entrega inmediata</div>
<div class="arrow">&rarr;</div>
<div class="grain"></div>
</body></html>
